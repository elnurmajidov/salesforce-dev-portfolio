<template>

    <lightning-card title="Animals List">

        <div class="slds-var-m-around_medium">

            <template for:each={animals} for:item="animal">

                <div
                    key={animal.id}
                    class="slds-box slds-theme_success slds-m-bottom_small"
                >

                    <p class="slds-text-heading_medium">

                        {animal.emoji} {animal.name}

                    </p>

                </div>

            </template>

        </div>

    </lightning-card>

</template>
