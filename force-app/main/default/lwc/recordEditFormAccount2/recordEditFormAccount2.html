<template>
    <lightning-card title="Account Edit Form" icon-name="standard:account">
        <div class="slds-var-m-horizontal_medium">
            <lightning-record-edit-form
              object-api-name={objectName}
              record-id={recordId}
              onsuccess={successHandler}>
              <lightning-messages></lightning-messages>
              <!--editable fields come here-->
              <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <div class="section-header">Main Details</div>
                    <lightning-input-field field-name={fields.name}></lightning-input-field>
                    <lightning-input-field field-name={fields.industry}></lightning-input-field>
                    <lightning-input-field field-name={fields.phone}></lightning-input-field>
                </div>
                <div class="slds-col">
                    <div class="section-header">Other Details</div>
                    <lightning-input-field field-name={fields.type}></lightning-input-field>
                    <lightning-input-field field-name={fields.rating}></lightning-input-field>
                    <lightning-input-field field-name={fields.revenue}></lightning-input-field>
                </div>
              </div>
              <!--Buttons Comes Here!!-->
              <div class="slds-align_absolute-center slds-var-m-top_medium">
                <lightning-button
                    label="Cancel"
                    variant="neutral"
                    class="slds-var-m-right_x-small"
                    type="reset">
                </lightning-button>
                <lightning-button
                    label="Save"
                    variant="brand"
                    type="submit">
                </lightning-button>

              </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
