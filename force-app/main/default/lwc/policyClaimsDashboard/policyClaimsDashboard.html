<template>
    <lightning-card title="Claims Summary" icon-name="standard:insurance_claim">
        <!-- Loading spinner until the wire resolves -->
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large spinner-holder">
                <lightning-spinner alternative-text="Loading claims summary" size="small"></lightning-spinner>
            </div>
        </template>

        <!-- Error state -->
        <template lwc:if={error}>
            <div class="slds-p-around_medium">
                <div class="slds-text-color_error" role="alert">{error}</div>
            </div>
        </template>

        <template lwc:if={summary}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">

                <!-- KPI tiles -->
                <div class="slds-grid slds-wrap slds-gutters_x-small slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                        <div class="kpi-tile">
                            <p class="slds-text-title">Total Claims</p>
                            <p class="kpi-value">{summary.totalClaims}</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                        <div class="kpi-tile">
                            <p class="slds-text-title">Total Claimed</p>
                            <p class="kpi-value">
                                <lightning-formatted-number value={summary.totalClaimAmount}
                                    format-style="currency"></lightning-formatted-number>
                            </p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                        <div class="kpi-tile">
                            <p class="slds-text-title">Approved / Paid</p>
                            <p class="kpi-value">
                                <lightning-formatted-number value={summary.approvedAmount}
                                    format-style="currency"></lightning-formatted-number>
                            </p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                        <div class="kpi-tile">
                            <p class="slds-text-title">Remaining Coverage</p>
                            <p class="kpi-value">
                                <lightning-formatted-number value={summary.remainingCoverage}
                                    format-style="currency"></lightning-formatted-number>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Coverage consumption bar -->
                <div class="slds-m-bottom_medium">
                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                        <span class="slds-text-title">Coverage Used</span>
                        <span class="slds-text-title">{coverageUsedPercent}%</span>
                    </div>
                    <div class="slds-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                        aria-valuenow={coverageUsedPercent} aria-label="Coverage used">
                        <span class={coverageBarClass} style={coverageBarStyle}></span>
                    </div>
                </div>

                <!-- Recent claims table -->
                <template lwc:if={hasClaims}>
                    <p class="slds-text-title slds-m-bottom_x-small">Recent Claims (last 10)</p>
                    <lightning-datatable key-field="Id" data={summary.recentClaims} columns={columns}
                        hide-checkbox-column="true" column-widths-mode="auto"></lightning-datatable>
                </template>
                <template lwc:else>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        No claims have been filed against this policy yet.
                    </p>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
