<template>
    <lightning-card>
        <template if:true={recordId}>
            <div class="slds-var-p-around_medium">
                <p class="slds-text-heading_medium slds-text-title_bold slds-var-m-bottom_small">
                    {carName}
                </p>
                <img src={pictureUrl} alt={carName} class="car-img slds-var-m-bottom_small" />
                <lightning-record-view-form record-id={recordId} object-api-name="Car__c">
                    <lightning-output-field field-name="Make__c"></lightning-output-field>
                    <lightning-output-field field-name="Category__c"></lightning-output-field>
                    <lightning-output-field field-name="Price__c"></lightning-output-field>
                    <div class="slds-text-heading_small slds-theme_shade slds-var-p-around_x-small slds-var-m-vertical_small">
                        OTHER DETAILS
                    </div>
                    <lightning-output-field field-name="Control__c"></lightning-output-field>
                    <lightning-output-field field-name="Fuel_Type__c"></lightning-output-field>
                    <lightning-output-field field-name="Seating_Capacity__c"></lightning-output-field>
                </lightning-record-view-form>
            </div>
        </template>
        <template if:false={recordId}>
            <p class="slds-var-p-around_medium slds-align_absolute-center">
                Select a car to see the details
            </p>
        </template>
    </lightning-card>
</template>
