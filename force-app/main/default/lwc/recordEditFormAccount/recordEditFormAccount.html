<template>
    <lightning-card title="Record Edit Account Form">
        <div class="slds-var-m-around_medium" style="background-color: rgb(247, 74, 0);">
            <lightning-record-edit-form
            object-api-name={objectApiName}
            record-id={recordId}
            onsuccess={successHandler}>
                <lightning-input-field field-name={fields.name}> </lightning-input-field>
                <lightning-input-field field-name={fields.rating} onchange={changeHandler}> </lightning-input-field>
                <template lwc:if={isIndustry}>
                <lightning-input-field field-name={fields.industry}> </lightning-input-field>
                </template>
                <template lwc:if={isOwnership}>
                <lightning-input-field field-name={fields.ownership}> </lightning-input-field>
                </template>
                <template lwc:if={isFax}>
                <lightning-input-field field-name={fields.fax}> </lightning-input-field>
                </template>
                <div class="slds-align_absolute-center">
                    <lightning-button 
                    variant="neutral" 
                    type="reset" 
                    label="Cancel">
                    </lightning-button>
                    <lightning-button 
                    variant="brand" 
                    type="submit" 
                    label="Save">
                    </lightning-button>
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
