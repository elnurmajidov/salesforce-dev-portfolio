<template>
    <lightning-card titile="Opportunity Record Form" icon-name="standard:opportunity">
        <div class="slds-p-around_medium">
            <lightning-record-form
                object-api-name={objectName}
                record-id={recordId}
                columns="2"
                fields={fields}
                onsuccess={successHandler}
                onerror={errorHandler}
                mode="edit">
            </lightning-record-form>
        </div>
    </lightning-card>
    
</template>
