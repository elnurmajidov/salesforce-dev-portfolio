<template>
    <lightning-card title="Name &amp; Role">

        <div class="slds-m-around_medium">
            <lightning-input
            type="Text"
            label="Enter your name"
            value={userName}
            onchange={changeHandler}>
            </lightning-input>

        <lightning-combobox
              
              label="Enter your role"
              value={role}
              options={roleOptions}
              onchange={roleHandler}>
        </lightning-combobox>
        
        <div class="slds-m-around_medium">
            Hello, my name is {userName} and my role is {role}

        </div>
        </div>

    </lightning-card>
</template>
